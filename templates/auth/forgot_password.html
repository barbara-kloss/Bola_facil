{% extends "base.html" %}
{% block title %}Esqueci minha senha - {{ brand_name }}{% endblock %}
{% block content %}
<section class="auth-layout">
  <div class="auth-panel">
    <h1>Recuperar Senha</h1>
    <p>Informe o e-mail cadastrado e enviaremos um link para você criar uma nova senha.</p>
    
    <form method="post" class="form" id="forgot-form" style="margin-top: 1rem;">
      <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
      <div class="form-group">
        <label for="email">E-mail</label>
        <input id="email" name="email" type="email" autocomplete="email" required>
      </div>
      
      <button type="submit" class="button-primary">Enviar Link</button>
    </form>
    
    <div style="margin-top: 1rem; text-align: center;">
      <a class="text-link" href="{{ url_for('auth.login') }}" style="color: var(--text-color-muted); font-size: 0.9rem;">Voltar para o Login</a>
    </div>
  </div>
</section>

<script>
document.getElementById('forgot-form').addEventListener('submit', function(e) {
  const btn = this.querySelector('button[type="submit"]');
  const original = btn.textContent;
  btn.disabled = true;
  btn.textContent = 'Enviando...';
  
  setTimeout(() => {
    btn.disabled = false;
    btn.textContent = original;
  }, 2000);
});

// Converte flashes para toasters
document.addEventListener('DOMContentLoaded', function() {
  const flashElements = document.querySelectorAll('.flash');
  flashElements.forEach(el => {
    const type = el.className.includes('success') ? 'success' : 'error';
    const message = el.textContent.trim();
    Toast[type](message);
    el.remove();
  });
});
</script>
{% endblock %}
