{% extends "base.html" %}
{% block title %}Entrar - {{ brand_name }}{% endblock %}
{% block content %}
<section class="auth-layout">
  <div class="auth-panel">
    <h1>Entrar</h1>
    <p>{{ brand_slogan }}</p>
    
    <form method="post" class="form" id="login-form">
      <div class="form-group">
        <label for="email">E-mail</label>
        <input id="email" name="email" type="email" autocomplete="email" required>
      </div>
      
      <div class="form-group">
        <label for="password">Senha</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required>
      </div>
      
      <button type="submit" class="button-primary">Entrar</button>
    </form>
    
    <a class="text-link" href="{{ url_for('auth.register') }}">Criar conta</a>
  </div>
</section>

<script>
document.getElementById('login-form').addEventListener('submit', function(e) {
  const btn = this.querySelector('button[type="submit"]');
  const original = btn.textContent;
  btn.disabled = true;
  btn.textContent = 'Autenticando...';
  
  setTimeout(() => {
    btn.disabled = false;
    btn.textContent = original;
  }, 2000);
});

// Converte flashes para toasters
document.addEventListener('DOMContentLoaded', function() {
  const flashElements = document.querySelectorAll('.flash');
  flashElements.forEach(el => {
    const type = el.className.includes('success') ? 'success' : 'error';
    const message = el.textContent.trim();
    Toast[type](message);
    el.remove();
  });
});
</script>
{% endblock %}
