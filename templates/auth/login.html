{% extends "base.html" %}
{% block title %}Entrar - {{ brand_name }}{% endblock %}
{% block content %}
<section class="auth-layout">
  <div class="auth-panel">
    <h1>Entrar</h1>
    <p>{{ brand_slogan }}</p>
    
    <form method="post" class="form" id="login-form">
      <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
      <div class="form-group">
        <label for="email">E-mail</label>
        <input id="email" name="email" type="email" autocomplete="email" value="{{ email | default('') }}" required>
      </div>
      
      <div class="form-group">
        <label for="password">Senha</label>
        <div class="password-wrap">
          <input id="password" name="password" type="password" autocomplete="current-password" required>
          <button type="button" class="password-toggle" aria-label="Mostrar senha" onclick="togglePassword('password', this)">
            <svg class="eye-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            <svg class="eye-off-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
          </button>
        </div>
      </div>
      
      <button type="submit" class="button-primary">Entrar</button>
    </form>
    
    <div style="display: flex; flex-direction: column; gap: 0.5rem; margin-top: 1.5rem; text-align: center;">
      <a class="text-link" href="{{ url_for('auth.register') }}">Criar conta</a>
      <a class="text-link" href="{{ url_for('auth.forgot_password') }}" style="color: var(--text-color-muted); font-size: 0.9rem;">Esqueci minha senha</a>
    </div>
  </div>
</section>

<script>
function togglePassword(fieldId, btn) {
  const input = document.getElementById(fieldId);
  const isPassword = input.type === 'password';
  input.type = isPassword ? 'text' : 'password';
  btn.querySelector('.eye-icon').style.display = isPassword ? 'none' : '';
  btn.querySelector('.eye-off-icon').style.display = isPassword ? '' : 'none';
}

document.getElementById('login-form').addEventListener('submit', function(e) {
  const btn = this.querySelector('button[type="submit"]');
  const original = btn.textContent;
  btn.disabled = true;
  btn.textContent = 'Autenticando...';
  
  setTimeout(() => {
    btn.disabled = false;
    btn.textContent = original;
  }, 2000);
});

// Converte flashes para toasters
document.addEventListener('DOMContentLoaded', function() {
  const flashElements = document.querySelectorAll('.flash');
  flashElements.forEach(el => {
    const type = el.className.includes('success') ? 'success' : 'error';
    const message = el.textContent.trim();
    Toast[type](message);
    el.remove();
  });
});
</script>
{% endblock %}
