{% extends "base.html" %}
{% block title %}Cadastro - {{ brand_name }}{% endblock %}
{% block content %}
<section class="auth-layout">
  <div class="auth-panel">
    <h1>Criar conta</h1>
    <p>Entre no bolão e acompanhe seus pontos rodada a rodada.</p>
    
    <form method="post" class="form" id="register-form">
      <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
      <div class="form-group">
        <label for="name">Nome</label>
        <input id="name" name="name" type="text" autocomplete="name" required>
      </div>
      
      <div class="form-group">
        <label for="email">E-mail</label>
        <input id="email" name="email" type="email" autocomplete="email" required>
      </div>
      
      <div class="form-group">
        <label for="whatsapp_phone">WhatsApp</label>
        <input id="whatsapp_phone" name="whatsapp_phone" type="tel" autocomplete="tel" placeholder="(11) 98765-4321" maxlength="15">
      </div>
      
      <div class="form-group">
        <label for="password">Senha (mín. 8 caracteres, letras e números)</label>
        <div class="password-wrap">
          <input id="password" name="password" type="password" autocomplete="new-password" minlength="8" pattern="(?=.*\d)(?=.*[a-zA-Z]).{8,}" title="Deve conter no mínimo 8 caracteres, com pelo menos uma letra e um número." required>
          <button type="button" class="password-toggle" aria-label="Mostrar senha" onclick="togglePassword('password', this)">
            <svg class="eye-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            <svg class="eye-off-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
          </button>
        </div>
      </div>
      
      <button type="submit" class="button-primary">Cadastrar</button>
    </form>
    
    <a class="text-link" href="{{ url_for('auth.login') }}">Já tenho conta</a>
  </div>
</section>

<script>
function togglePassword(fieldId, btn) {
  const input = document.getElementById(fieldId);
  const isPassword = input.type === 'password';
  input.type = isPassword ? 'text' : 'password';
  btn.querySelector('.eye-icon').style.display = isPassword ? 'none' : '';
  btn.querySelector('.eye-off-icon').style.display = isPassword ? '' : 'none';
}

document.getElementById('whatsapp_phone').addEventListener('input', function(e) {
  let x = e.target.value.replace(/\D/g, '').match(/(\d{0,2})(\d{0,5})(\d{0,4})/);
  e.target.value = !x[2] ? x[1] : '(' + x[1] + ') ' + x[2] + (x[3] ? '-' + x[3] : '');
});

// Remove mask on submit so backend gets clean numbers (optional, but good practice, though existing backend might strip it)
document.getElementById('register-form').addEventListener('submit', function(e) {
  const phone = document.getElementById('whatsapp_phone');
  if (phone) {
    const raw = phone.value.replace(/\D/g, '');
    if (raw.length > 0 && (raw.length < 10 || raw.length > 15)) {
      e.preventDefault();
      Toast.error("WhatsApp inválido. Insira o DDD + número.");
      return;
    }
    phone.value = raw;
  }
  
  const btn = this.querySelector('button[type="submit"]');
  const original = btn.textContent;
  btn.disabled = true;
  btn.textContent = 'Criando conta...';
  
  setTimeout(() => {
    btn.disabled = false;
    btn.textContent = original;
  }, 2000);
});

// Converte flashes para toasters
document.addEventListener('DOMContentLoaded', function() {
  const flashElements = document.querySelectorAll('.flash');
  flashElements.forEach(el => {
    const type = el.className.includes('success') ? 'success' : 'error';
    const message = el.textContent.trim();
    Toast[type](message);
    el.remove();
  });
});
</script>
{% endblock %}
