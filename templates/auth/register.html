{% extends "base.html" %}
{% block title %}Cadastro - {{ brand_name }}{% endblock %}
{% block content %}
<section class="auth-layout">
  <div class="auth-panel">
    <h1>Criar conta</h1>
    <p>Entre no bolão e acompanhe seus pontos rodada a rodada.</p>
    
    <form method="post" class="form" id="register-form">
      <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
      <div class="form-group">
        <label for="name">Nome</label>
        <input id="name" name="name" type="text" autocomplete="name" required>
      </div>
      
      <div class="form-group">
        <label for="email">E-mail</label>
        <input id="email" name="email" type="email" autocomplete="email" required>
      </div>
      
      <div class="form-group">
        <label for="whatsapp_phone">WhatsApp</label>
        <input id="whatsapp_phone" name="whatsapp_phone" type="tel" autocomplete="tel" placeholder="(11) 98765-4321" maxlength="15">
      </div>
      
      <div class="form-group">
        <label for="password">Senha (mín. 6 caracteres)</label>
        <input id="password" name="password" type="password" autocomplete="new-password" minlength="6" required>
      </div>
      
      <button type="submit" class="button-primary">Cadastrar</button>
    </form>
    
    <a class="text-link" href="{{ url_for('auth.login') }}">Já tenho conta</a>
  </div>
</section>

<script>
document.getElementById('whatsapp_phone').addEventListener('input', function(e) {
  let x = e.target.value.replace(/\D/g, '').match(/(\d{0,2})(\d{0,5})(\d{0,4})/);
  e.target.value = !x[2] ? x[1] : '(' + x[1] + ') ' + x[2] + (x[3] ? '-' + x[3] : '');
});

// Remove mask on submit so backend gets clean numbers (optional, but good practice, though existing backend might strip it)
document.getElementById('register-form').addEventListener('submit', function(e) {
  const phone = document.getElementById('whatsapp_phone');
  if (phone) {
    phone.value = phone.value.replace(/\D/g, '');
  }
  
  const btn = this.querySelector('button[type="submit"]');
  const original = btn.textContent;
  btn.disabled = true;
  btn.textContent = 'Criando conta...';
  
  setTimeout(() => {
    btn.disabled = false;
    btn.textContent = original;
  }, 2000);
});

// Converte flashes para toasters
document.addEventListener('DOMContentLoaded', function() {
  const flashElements = document.querySelectorAll('.flash');
  flashElements.forEach(el => {
    const type = el.className.includes('success') ? 'success' : 'error';
    const message = el.textContent.trim();
    Toast[type](message);
    el.remove();
  });
});
</script>
{% endblock %}
