{% extends "base.html" %}
{% block title %}Criar Nova Senha - {{ brand_name }}{% endblock %}
{% block content %}
<section class="auth-layout">
  <div class="auth-panel">
    <h1>Criar Nova Senha</h1>
    <p>Digite sua nova senha abaixo.</p>
    
    <form method="post" class="form" id="reset-form" style="margin-top: 1rem;">
      <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
      <div class="form-group">
        <label for="password">Nova Senha</label>
        <input id="password" name="password" type="password" required minlength="6">
      </div>
      <div class="form-group">
        <label for="password_confirm">Confirmar Nova Senha</label>
        <input id="password_confirm" name="password_confirm" type="password" required minlength="6">
      </div>
      
      <button type="submit" class="button-primary">Salvar Nova Senha</button>
    </form>
  </div>
</section>

<script>
document.getElementById('reset-form').addEventListener('submit', function(e) {
  const pwd = document.getElementById('password').value;
  const pwdConf = document.getElementById('password_confirm').value;
  
  if (pwd !== pwdConf) {
    e.preventDefault();
    Toast.error("As senhas não coincidem.");
    return;
  }
  
  const btn = this.querySelector('button[type="submit"]');
  const original = btn.textContent;
  btn.disabled = true;
  btn.textContent = 'Salvando...';
  
  setTimeout(() => {
    btn.disabled = false;
    btn.textContent = original;
  }, 2000);
});

// Converte flashes para toasters
document.addEventListener('DOMContentLoaded', function() {
  const flashElements = document.querySelectorAll('.flash');
  flashElements.forEach(el => {
    const type = el.className.includes('success') ? 'success' : 'error';
    const message = el.textContent.trim();
    Toast[type](message);
    el.remove();
  });
});
</script>
{% endblock %}
