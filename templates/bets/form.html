{% extends "base.html" %}

{% block content %}
<h2>Realizar Aposta</h2>

{% if game %}
    <div class="bet-form-container">
        <h3>{{ game.team_a }} vs {{ game.team_b }}</h3>
        
        <form id="bet-form" method="POST">
            <div class="form-group">
                <label>Sua Previsão:</label>
                <div class="prediction-options">
                    <label><input type="radio" name="prediction" value="1"> Vitória {{ game.team_a }}</label>
                    <label><input type="radio" name="prediction" value="X"> Empate</label>
                    <label><input type="radio" name="prediction" value="2"> Vitória {{ game.team_b }}</label>
                </div>
            </div>

            <div class="form-group">
                <label for="amount">Valor da Aposta (opcional):</label>
                <input type="number" id="amount" name="amount" step="0.01" min="0">
            </div>

            <button type="submit" class="btn btn-primary">Confirmar Aposta</button>
            <a href="/games/{{ game.id }}" class="btn btn-secondary">Cancelar</a>
        </form>
    </div>
{% endif %}
{% endblock %}
