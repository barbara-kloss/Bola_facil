{% extends "base.html" %}
{% block title %}Palpite - {{ brand_name }}{% endblock %}
{% block content %}
<section class="content-head">
  <h1>{{ game.home_team }} x {{ game.away_team }}</h1>
  <p>Informe seu placar antes do encerramento do jogo.</p>
</section>
<form method="post" class="form score-form">
  <label for="predicted_home_score">{{ game.home_team }}</label>
  <input id="predicted_home_score" name="predicted_home_score" type="number" min="0" required value="{{ bet.predicted_home_score if bet else 0 }}">
  <label for="predicted_away_score">{{ game.away_team }}</label>
  <input id="predicted_away_score" name="predicted_away_score" type="number" min="0" required value="{{ bet.predicted_away_score if bet else 0 }}">
  <button type="submit">Salvar palpite</button>
</form>
{% endblock %}
