{% extends "base.html" %}
{% block title %}Estatísticas - {{ brand_name }}{% endblock %}
{% block content %}
<section class="content-head">
  <h1>Estatísticas</h1>
  <p>Acompanhe o movimento do bolão.</p>
</section>
<section class="stats-grid">
  <article class="stat-card"><span>Bolões</span><strong>{{ stats.total_pools }}</strong></article>
  <article class="stat-card"><span>Palpites</span><strong>{{ stats.total_bets }}</strong></article>
  <article class="stat-card"><span>Pontos</span><strong>{{ stats.total_points }}</strong></article>
</section>
<canvas id="pointsChart" class="chart" width="900" height="320" data-values="[{{ stats.total_pools }},{{ stats.total_bets }},{{ stats.total_points }}]"></canvas>
{% endblock %}
{% block scripts %}
<script src="{{ url_for('static', filename='js/charts.js') }}"></script>
{% endblock %}
